# MooTask Nginx 生产环境配置模板

# ===========================================
# 请将此文件复制到 /etc/nginx/sites-available/mootask
# 然后执行: sudo ln -s /etc/nginx/sites-available/mootask /etc/nginx/sites-enabled/
# ===========================================

server {
    listen 80;
    server_name your-domain.com;  # 替换为您的域名或IP地址

    # 重定向到 HTTPS（取消注释以启用）
    # return 301 https://$server_name$request_uri;
}

