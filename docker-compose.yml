version: '3.8'

# MooTask Docker Compose 配置
# 包含完整的开发环境：PHP-FPM、Nginx、MySQL、Redis、WebSocket

services:
  # PHP 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mootask_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mootask_network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=mootask
      - DB_USERNAME=mootask
      - DB_PASSWORD=mootask_pass
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - JWT_SECRET=mootask_jwt_secret_key_please_change_in_production
      - JWT_TTL=1440

  # Nginx Web 服务器
  nginx:
    image: nginx:alpine
    container_name: mootask_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mootask_network
    depends_on:
      - app

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: mootask_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mootask
      MYSQL_USER: mootask
      MYSQL_PASSWORD: mootask_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - mootask_network
    command: --default-authentication-plugin=mysql_native_password

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mootask_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mootask_network

  # WebSocket 服务（基于 Swoole）
  websocket:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: mootask_websocket
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - mootask_network
    depends_on:
      - app
      - redis
    environment:
      - LARAVEL_SWS_HTTP_HOST=0.0.0.0
      - LARAVEL_SWS_HTTP_PORT=5200
    command: php artisan laravels start --host=0.0.0.0 --port=5200
    ports:
      - "5200:5200"

networks:
  mootask_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
