# ===========================================
# MooTask Docker 生产环境配置
# ===========================================

version: '3.8'

services:
  # PHP 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mootask_app
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_data:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - mootask_network
    depends_on:
      - mysql
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Web 服务器
  nginx:
    image: nginx:alpine
    container_name: mootask_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - app_data:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - mootask_network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: mootask_mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mootask
      MYSQL_USER: mootask
      MYSQL_PASSWORD: ${DB_PASSWORD:-mootask_strong_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_strong_password}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - mootask_network
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_strong_password}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: mootask_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mootask_network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # WebSocket 服务
  websocket:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mootask_websocket
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_data:/var/www/html
    networks:
      - mootask_network
    depends_on:
      - redis
    environment:
      - LARAVEL_SWS_HTTP_HOST=0.0.0.0
      - LARAVEL_SWS_HTTP_PORT=5200
    command: php artisan laravels start --host=0.0.0.0 --port=5200
    ports:
      - "5200:5200"

  # 队列 Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mootask_queue
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_data:/var/www/html
    networks:
      - mootask_network
    depends_on:
      - redis
      - mysql
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    deploy:
      replicas: 2

  # Scheduler (定时任务)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mootask_scheduler
    restart: always
    working_dir: /var/www/html
    volumes:
      - app_data:/var/www/html
    networks:
      - mootask_network
    depends_on:
      - mysql
      - redis
    command: >
      sh -c "while true; do
        php artisan schedule:run;
        sleep 60;
      done"

networks:
  mootask_network:
    driver: bridge

volumes:
  app_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local
